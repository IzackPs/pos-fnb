name: CI Quality Gate — Out-Main → main

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-merge-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

# Força o uso de Node.js 24 em todas as GitHub Actions (checkout, setup-node, etc.)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Lint (ESLint)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      # Gera relatório em formato compatível com SonarQube
      - name: Run ESLint
        run: npm run lint -- --format json --output-file eslint-report.json

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Type Check (TypeScript)
# O typecheck só precisa do Prisma Client gerado e do schema válido.
# Não deve depender de banco ativo nem mascarar drift com `db push`.
# ─────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (TypeScript)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Prisma Client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}

      - name: Generate Prisma Client
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Type check
        run: npx tsc -p tsconfig.typecheck.json --noEmit

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Unit Tests (Vitest)
# ─────────────────────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      AUTH_SECRET: "ci-secret-not-used"
      AUTH_URL: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Prisma Client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}

      - name: Generate Prisma Client
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: npx prisma generate

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

# ─────────────────────────────────────────────────────────────────────────────
# Job 4: Build (Next.js)
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    needs: unit
    env:
      DATABASE_URL: "postgresql://posfnb:posfnb@localhost:5432/posfnb?schema=public"
      AUTH_SECRET: "ci-secret-not-used"
      AUTH_URL: "http://localhost:3000"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Prisma Client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}

      - name: Generate Prisma Client
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: npx prisma generate

      - name: Build
        run: npm run build

# ─────────────────────────────────────────────────────────────────────────────
# Job 5: SonarQube Scan + Quality Gate
# ─────────────────────────────────────────────────────────────────────────────
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth 0 é obrigatório para blame e histórico correto
          fetch-depth: 0

      - name: Download ESLint report
        uses: actions/download-artifact@v4
        with:
          name: eslint-report

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: SonarQube Scan + Quality Gate
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >-
            -Dsonar.qualitygate.wait=true

# ─────────────────────────────────────────────────────────────────────────────
# Job 6: Auto-merge (só roda se os jobs anteriores passarem)
# ─────────────────────────────────────────────────────────────────────────────
  auto-merge:
    name: Auto-Merge Out-Main → main
    needs: sonar
    if: >
      success() &&
      github.event_name == 'pull_request' &&
      github.base_ref == 'main' &&
      github.head_ref == 'Out-Main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge Out-Main → main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main
          git merge Out-Main --no-ff -m "🔀 Auto-merge Out-Main → main (lint ✅ | types ✅ | tests ✅ | build ✅ | sonar gate ✅)"
          git push origin main

          echo "✅ Out-Main merged into main successfully!"

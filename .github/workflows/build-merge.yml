name: CI Quality Gate — Out-Main → main

on:
  push:
    branches: [Out-Main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  pull-requests: read

# Força o uso de Node.js 24 em todas as GitHub Actions (checkout, setup-node, etc.)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Lint (ESLint)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Gera relatório em formato compatível com SonarQube
      - name: Run ESLint
        run: npx eslint --format json --output-file eslint-report.json || true

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Type Check (TypeScript)
# Usa `prisma db push` em vez de `migrate deploy` porque o migration_lock.toml
# ainda precisa ser resetado localmente para PostgreSQL.
# Após rodar `prisma migrate dev --name init_postgres` localmente e commitar,
# este job pode ser trocado por `migrate deploy`.
# ─────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (TypeScript)
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: "postgresql://posfnb:posfnb@localhost:5432/posfnb?schema=public"
      AUTH_SECRET: "ci-secret-not-used"
      AUTH_URL: "http://localhost:3000"

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: posfnb
          POSTGRES_USER: posfnb
          POSTGRES_PASSWORD: posfnb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # db push aplica o schema diretamente sem checar o migration_lock.toml
      # Isso resolve o conflito SQLite→PostgreSQL até as migrations serem resetadas
      - name: Apply schema to DB (db push)
        run: npx prisma db push --accept-data-loss

      - name: Type check
        run: npx tsc --noEmit

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Unit Tests (Vitest)
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      AUTH_SECRET: "ci-secret-not-used"
      AUTH_URL: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

# ─────────────────────────────────────────────────────────────────────────────
# Job 4: Build (Next.js)
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    needs: test
    env:
      DATABASE_URL: "postgresql://posfnb:posfnb@localhost:5432/posfnb?schema=public"
      AUTH_SECRET: "ci-secret-not-used"
      AUTH_URL: "http://localhost:3000"
      NEXT_TELEMETRY_DISABLED: "1"

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: posfnb
          POSTGRES_USER: posfnb
          POSTGRES_PASSWORD: posfnb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply schema to DB (db push)
        run: npx prisma db push --accept-data-loss

      - name: Build
        run: npm run build

# ─────────────────────────────────────────────────────────────────────────────
# Job 5: SonarQube Scan + Quality Gate
# ─────────────────────────────────────────────────────────────────────────────
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth 0 é obrigatório para blame e histórico correto
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download ESLint report
        uses: actions/download-artifact@v4
        with:
          name: eslint-report

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: SonarQube Scan + Quality Gate
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >-
            -Dsonar.qualitygate.wait=false

# ─────────────────────────────────────────────────────────────────────────────
# Job 6: Auto-merge (só roda se TODOS os jobs anteriores passarem)
# ─────────────────────────────────────────────────────────────────────────────
  auto-merge:
    name: Auto-Merge Out-Main → main
    needs: sonar
    if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/Out-Main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge Out-Main → main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main
          git merge Out-Main --no-ff -m "🔀 Auto-merge Out-Main → main (lint ✅ | types ✅ | build ✅ | sonar ✅)"
          git push origin main

          echo "✅ Out-Main merged into main successfully!"

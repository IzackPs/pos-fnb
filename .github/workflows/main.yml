name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1

permissions:
  contents: read

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --format json --output-file eslint-report.json

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json

  # ─── Unit Tests ────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint
    env:
      AUTH_SECRET: ci-secret-not-used
      AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Prisma Client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}

      - name: Generate Prisma Client
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: npx prisma generate

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

  # ─── SonarQube Scan ────────────────────────────────────────────────────────
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [load]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download ESLint report
        uses: actions/download-artifact@v4
        with:
          name: eslint-report

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build (Dockerfile)
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Dockerfile builder stage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: builder
          load: true
          tags: pos-fnb:builder
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract standalone build
        run: |
          container_id="$(docker create pos-fnb:builder)"
          mkdir -p .next
          docker cp "$container_id:/app/.next/standalone" .next/standalone
          docker cp "$container_id:/app/.next/static" .next/static
          docker cp "$container_id:/app/public" public
          docker rm "$container_id"

      - name: Upload standalone build
        uses: actions/upload-artifact@v4
        with:
          name: next-standalone-build
          include-hidden-files: true
          retention-days: 1
          path: |
            .next/standalone
            .next/static
            public

  # ─── Integration Tests ──────────────────────────────────────────────────────
  integration:
    name: Integration Test (Postgres + NextAuth)
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postest
      AUTH_SECRET: ci-integration-test-secret
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      BASE_URL: http://localhost:3000
      PORT: 3000
      HOSTNAME: 0.0.0.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Migrate and seed
        run: |
          npx prisma migrate deploy
          npx prisma db seed

      - name: Download standalone build
        uses: actions/download-artifact@v4
        with:
          name: next-standalone-build

      - name: Start standalone server
        run: node .next/standalone/server.js &

      - name: Run integration smoke
        run: npm run test:integration

  # ─── Load Test (k6) ────────────────────────────────────────────────────────
  load:
    name: Load Test (k6)
    runs-on: ubuntu-latest
    needs: [build, integration]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postest
      AUTH_SECRET: ci-load-test-secret
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      PORT: 3000
      HOSTNAME: 0.0.0.0
      LOAD_TEST_PROFILE: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Prisma Client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}

      - name: Generate Prisma Client
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: npx prisma generate

      - name: Migrate and seed
        run: |
          npx prisma migrate deploy
          npx prisma db seed

      - name: Download standalone build
        uses: actions/download-artifact@v4
        with:
          name: next-standalone-build

      - name: Start standalone server
        run: node .next/standalone/server.js &

      - name: Wait for server
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/login && break
            echo "Waiting... ($i)"
            sleep 3
          done
          curl -sf http://localhost:3000/login > /dev/null

      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/load-test.js
          flags: --out json=k6-results.json
        env:
          BASE_URL: http://localhost:3000

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6-results.json

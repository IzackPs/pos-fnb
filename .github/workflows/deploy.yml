name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }} # Agora será deployer
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/pos-fnb
            git fetch origin
            git reset --hard origin/main
            # Como restringimos a segurança, o docker agora exige sudo
            sudo docker compose up -d --build


# sonar-project.properties
# Configuração do SonarQube para o projeto POS-F&B (Next.js 16 + TypeScript)
# Documentação: https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/scanners/sonarscanner/

# ─── Identificação do projeto ───────────────────────────────────────────────
# IMPORTANTE: sonar.organization é obrigatório para o SonarCloud.
# Acesse sonarcloud.io → sua organização → "Organization Key" e cole aqui.
# Geralmente é seu username GitHub em minúsculas (ex: izackps).
sonar.organization=izackps
sonar.projectKey=pos-fnb
sonar.projectName=POS F&B
sonar.projectVersion=1.2.0

# ─── Código-fonte ────────────────────────────────────────────────────────────
# Diretórios com código de produção
sonar.sources=src

# Testes colocalizados devem ficar fora da análise do Sonar
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  src/test/**,\
  src/components/ui/**,\
  src/lib/auth.ts,\
  src/lib/auth-types.ts,\
  src/app/api/auth/**

# ─── Exclusões ───────────────────────────────────────────────────────────────
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  src/.next/**,\
  out/**,\
  build/**,\
  public/**,\
  prisma/migrations/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.config.ts,\
  **/*.config.mjs,\
  **/generated/**,\
  src/generated/**,\
  coverage/**,\
  **/*.d.ts

# ─── TypeScript ──────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=tsconfig.json

# ─── Relatório de cobertura (adicionar quando tiver testes) ──────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ─── Relatório ESLint ────────────────────────────────────────────────────────
# O arquivo é gerado pelo job 'lint' do GitHub Actions e baixado no job 'sonar'
sonar.eslint.reportPaths=eslint-report.json

# ─── Encoding ────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ─── SCM ─────────────────────────────────────────────────────────────────────
# Necessário para blame e histórico de issues (fetch-depth 0 no checkout)
sonar.scm.provider=git
